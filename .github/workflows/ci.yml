name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy scikit-learn matplotlib seaborn plotly pyyaml pytest

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Check code syntax
        run: |
          python -m py_compile app_dashboard.py
          python -m py_compile src/features/engineering.py
          python -m py_compile src/models/isolation_forest.py
          python -m py_compile src/models/evaluator.py
          echo "Syntax check passed"
